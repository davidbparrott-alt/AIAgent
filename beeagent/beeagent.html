<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BeeAgent – Beekeeping Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 1.5rem;
      background: #f6f4f0;
      color: #222;
    }
    h1, h2 { margin-top: 0; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    input[type="text"] {
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      width: 200px;
      margin-right: 0.5rem;
    }
    button {
      padding: 0.45rem 0.9rem;
      border-radius: 4px;
      border: none;
      background: #f4b400;
      color: #222;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #e0a000; }
    textarea {
      width: 100%;
      max-width: 600px;
      padding: 0.5rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-family: inherit;
    }
    #aiAnswer {
      white-space: pre-wrap;
      margin-top: 0.5rem;
      background: #faf7e8;
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid #e0d6b8;
      max-width: 700px;
    }
    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .forecast-day {
      background: #fafafa;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      border: 1px solid #eee;
      font-size: 0.9rem;
    }
    .pollen-bar {
      height: 10px;
      border-radius: 4px;
      background: #eee;
      overflow: hidden;
      margin-top: 4px;
      margin-bottom: 8px;
    }
    .pollen-fill { height: 100%; }
    .pollen-low { background: #4caf50; }
    .pollen-medium { background: #ff9800; }
    .pollen-high { background: #f44336; }
    .gauge {
      font-size: 1.1rem;
      margin-bottom: 0.4rem;
    }
  </style>
</head>

<body>
  <h1>BeeAgent – Local Beekeeping Assistant</h1>

  <div class="card">
    <label>Location (UK town / postcode):</label>
    <input id="location" type="text" value="Stowmarket">
    <button onclick="updateAll()">Update</button>
    <div id="statusText" style="font-size:0.85rem;color:#555;">Using default location: Stowmarket</div>
  </div>

  <div class="card">
    <h2>Current Weather</h2>
    <div id="weatherSummary">Loading…</div>
  </div>

  <div class="card">
    <h2>Pollen Levels</h2>
    <div id="pollenSummary">Loading…</div>
    <div id="pollenBars"></div>
  </div>

  <div class="card">
    <h2>Nectar Flow Outlook</h2>
    <div id="nectarGauge" class="gauge">Loading…</div>
    <div id="nectarOutlook">Calculating…</div>
  </div>

  <div class="card">
    <h2>4‑Day Forecast</h2>
    <div id="forecastGrid" class="forecast-grid"></div>
  </div>

  <div class="card">
    <h2>Seasonal Tips</h2>
    <div id="seasonalTips"></div>
  </div>

  <div class="card">
    <h2>Current Forage Sources (East Anglia)</h2>
    <div id="forageSources">Loading…</div>
  </div>

  <div class="card">
    <h2>Ask the Bee Agent</h2>
    <textarea id="question" rows="3" placeholder="Ask a beekeeping question…"></textarea>
    <br><br>
    <button onclick="askAI()">Ask</button>
    <div id="aiAnswer"></div>
  </div>

<script>
  window.latestWeather = null;
  window.latestPollen = null;

  const forageCalendar = {
    1: [],
    2: ["Hazel", "Alder", "Willow", "Gorse"],
    3: ["Willow", "Dandelion", "Fruit blossom"],
    4: ["Fruit blossom", "Oilseed rape (OSR)", "Dandelion"],
    5: ["Oilseed rape (OSR)", "Hawthorn", "Horse chestnut"],
    6: ["Bramble", "Clover", "Lime"],
    7: ["Bramble", "Clover"],
    8: ["Clover", "Himalayan balsam (where present)"],
    9: ["Ivy"],
    10: ["Ivy"],
    11: [],
    12: []
  };

  function getCurrentForageSources() {
    const month = new Date().getMonth() + 1;
    return forageCalendar[month] || [];
  }

  async function geocodeLocation(name) {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=en&format=json`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.results || data.results.length === 0) throw new Error("Location not found");
    return data.results[0];
  }

  async function fetchWeather(lat, lon) {
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      "&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation" +
      "&daily=temperature_2m_max,temperature_2m_min,precipitation_sum" +
      "&timezone=auto";
    return fetch(url).then(r => r.json());
  }

  async function fetchPollen(lat, lon) {
    const url =
      `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}` +
      "&hourly=alder_pollen,birch_pollen,grass_pollen,ragweed_pollen,olive_pollen" +
      "&timezone=auto";
    return fetch(url).then(r => r.json());
  }

  function pollenLevel(v) {
    if (v < 20) return { label: "low", class: "pollen-low", width: 25 };
    if (v < 80) return { label: "medium", class: "pollen-medium", width: 60 };
    return { label: "high", class: "pollen-high", width: 90 };
  }

  function renderWeather(data, name) {
    const c = data.current;
    document.getElementById("weatherSummary").innerHTML = `
      <strong>${name}</strong><br>
      Temperature: ${c.temperature_2m} °C<br>
      Humidity: ${c.relative_humidity_2m} %<br>
      Wind: ${c.wind_speed_10m} km/h<br>
      Rain: ${c.precipitation} mm
    `;

    const d = data.daily;
    const grid = document.getElementById("forecastGrid");
    grid.innerHTML = "";
    for (let i = 0; i < 4; i++) {
      const div = document.createElement("div");
      div.className = "forecast-day";
      div.innerHTML = `
        <strong>${d.time[i]}</strong><br>
        Max: ${d.temperature_2m_max[i]} °C<br>
        Min: ${d.temperature_2m_min[i]} °C<br>
        Rain: ${d.precipitation_sum[i]} mm
      `;
      grid.appendChild(div);
    }
  }

  function renderPollen(data) {
    const h = data.hourly;
    const i = h.time.length - 1;

    const alder = h.alder_pollen?.[i] ?? 0;

    const values = { Alder: alder };

    const lvl = pollenLevel(alder);
    document.getElementById("pollenSummary").innerHTML =
      `Bee‑relevant pollen (alder): <strong>${lvl.label}</strong>`;

    const bars = document.getElementById("pollenBars");
    bars.innerHTML = "";

    for (const [name, value] of Object.entries(values)) {
      const l = pollenLevel(value);
      bars.innerHTML += `
        <div><strong>${name}</strong> – ${l.label} (${value ? value.toFixed(1) : "n/a"})</div>
        <div class="pollen-bar">
          <div class="pollen-fill ${l.class}" style="width:${l.width}%"></div>
        </div>
      `;
    }
  }

  function renderNectarOutlook(weather, pollen) {
    const temp = weather.current.temperature_2m;
    const wind = weather.current.wind_speed_10m;
    const rain = weather.current.precipitation;

    const h = pollen.hourly;
    const i = h.time.length - 1;
    const alder = h.alder_pollen?.[i] ?? 0;

    const month = new Date().getMonth() + 1;
    const sources = getCurrentForageSources();

    let gauge = "🟡 Patchy flow";
    let msg = "";

    const goodWeather = temp >= 16 && temp <= 28 && wind < 20 && rain < 1;
    const poorWeather = temp < 12 || rain > 3;

    if (sources.length === 0) {
      gauge = "🔴 Dearth";
      msg = "Very limited forage in bloom. Bees rely mainly on stored honey.";
    } else if (goodWeather) {
      gauge = "🟢 Strong flow";
      msg =
        "Major nectar sources are in bloom and weather supports foraging. Expect good nectar intake.";
    } else if (poorWeather) {
      gauge = "🔴 Dearth / suppressed flow";
      msg =
        "Forage is present but cool or wet conditions will suppress flying.";
    } else {
      gauge = "🟡 Patchy flow";
      msg =
        "Some forage is available and bees will fly in windows of good weather.";
    }

    if (month <= 3 && alder > 20) {
      msg += " Early‑season alder pollen suggests brood rearing is underway.";
    }

    document.getElementById("nectarGauge").textContent = gauge;
    document.getElementById("nectarOutlook").textContent = msg;
  }

  function renderSeasonalTips() {
    const m = new Date().getMonth() + 1;
    let t = "";
    if (m <= 2) t = "Late winter: minimal disturbance, check stores and heft hives.";
    else if (m <= 4) t = "Early spring: first inspections on warm days; prepare for swarm control.";
    else if (m <= 6) t = "Peak season: swarm control, add supers, monitor space.";
    else if (m <= 8) t = "Late summer: harvest, varroa treatment, assess colony strength.";
    else if (m <= 10) t = "Autumn: ensure winter stores and complete treatments.";
    else t = "Winter: avoid opening hives; monitor weight.";
    document.getElementById("seasonalTips").textContent = t;
  }

  function renderForageSources() {
    const sources = getCurrentForageSources();
    const div = document.getElementById("forageSources");

    if (!sources.length) {
      div.textContent = "Very limited natural forage – bees rely mostly on stored honey.";
      return;
    }

    const list = sources.map(s => "• " + s).join("<br>");
    div.innerHTML = `
      <strong>Currently flowering (typical East Anglia):</strong><br>
      ${list}
    `;

    if (window.latestWeather) {
      const temp = window.latestWeather.current.temperature_2m;
      const wind = window.latestWeather.current.wind_speed_10m;
      const rain = window.latestWeather.current.precipitation;

      let note = "";
      if (temp >= 16 && temp <= 28 && wind < 20 && rain < 1) {
        note = "Conditions are good for bees to work these sources.";
      } else if (temp < 12 || rain > 3) {
        note = "Bloom is present but cool or wet weather will limit foraging.";
      } else {
        note = "Bees will work these sources in better parts of the day.";
      }

      div.innerHTML += `<br><br><em>${note}</em>`;
    }
  }

  async function updateAll() {
    const loc = document.getElementById("location").value.trim() || "Stowmarket";
    document.getElementById("statusText").textContent = "Looking up location…";

    try {
      const geo = await geocodeLocation(loc);
      document.getElementById("statusText").textContent =
        `Location: ${geo.name}, ${geo.country}`;

      const [weather, pollen] = await Promise.all([
        fetchWeather(geo.latitude, geo.longitude),
        fetchPollen(geo.latitude, geo.longitude)
      ]);

      window.latestWeather = weather;
      window.latestPollen = pollen;

      renderWeather(weather, geo.name);
      renderPollen(pollen);
      renderNectarOutlook(weather, pollen);
      renderSeasonalTips();
      renderForageSources();
    } catch (err) {
      console.error(err);
      document.getElementById("statusText").textContent =
        "Error loading location or data.";
    }
  }

  async function askAI() {
    const q = document.getElementById("question").value.trim();
    if (!q) {
      document.getElementById("aiAnswer").textContent =
        "Please type a question.";
      return;
    }

    if (!window.latestWeather || !window.latestPollen) {
      document.getElementById("aiAnswer").textContent =
        "Weather/pollen not loaded. Click Update first.";
      return;
    }

    document.getElementById("aiAnswer").textContent = "Thinking…";

    try {
      const res = await fetch("http://localhost:3000/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question: q,
          weather: window.latestWeather,
          pollen: window.latestPollen,
          forageCalendar
        })
      });

      const data = await res.json();
      document.getElementById("aiAnswer").textContent =
        data.answer || "No answer received.";
    } catch (err) {
      document.getElementById("aiAnswer").textContent =
        "Could not reach backend. Is server.js running?";
    }
  }

  updateAll();
</script>

</body>
</html>
